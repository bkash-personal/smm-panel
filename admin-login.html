<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>অ্যাডমিন লগইন — সোশ্যাল বুস্ট</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@300;400;600;800;900&family=Inter:wght@300;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="auth-body">

<div class="auth-box">
  <div class="auth-brand"><i class="fa-solid fa-shield-halved"></i> অ্যাডমিন অ্যাক্সেস</div>
  <h2>অ্যাডমিন লগইন</h2>
  <p class="auth-sub">এই পেজে প্রবেশের জন্য আলাদা অ্যাডমিন পাসওয়ার্ড দিন</p>
  <form id="adminLoginForm">
    <input type="password" id="admin_pass" placeholder="অ্যাডমিন পাসওয়ার্ড" required>
    <button type="submit">প্রবেশ করুন</button>
  </form>
  <p class="auth-link">পাসওয়ার্ড ভুলে গেছেন? <strong>bdclick24admin</strong></p>
  <p class="auth-link"><a href="index.html"><i class="fa-solid fa-arrow-left"></i> হোমে ফিরে যান</a></p>
</div>

<script>
const ADMIN_PASS = 'bdclick24admin';
const f = document.getElementById('adminLoginForm');
f.addEventListener('submit', function(e) {
  e.preventDefault();
  const p = document.getElementById('admin_pass').value.trim();
  if (p === ADMIN_PASS) {
    localStorage.setItem('adminSession', 'true');
    alert('অ্যাডমিন লগইন সফল!');
    window.location.href = 'admin.html';
  } else {
    alert('ভুল অ্যাডমিন পাসওয়ার্ড!');
  }
});
</script>

</body>
</html>
