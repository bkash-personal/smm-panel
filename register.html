<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>রেজিস্টার — সোশ্যাল বুস্ট</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@300;400;600;800;900&family=Inter:wght@300;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="auth-body">

<div class="auth-box">
  <div class="auth-brand"><i class="fa-solid fa-rocket"></i> সোশ্যাল বুস্ট</div>
  <h2>ফ্রি অ্যাকাউন্ট খুলুন</h2>
  <p class="auth-sub">আপনার সোশ্যাল মিডিয়া গ্রোথ শুরু করুন</p>
  <form id="regForm">
    <input type="text" id="r_name" placeholder="আপনার নাম" required>
    <input type="email" id="r_email" placeholder="ইমেইল" required>
    <input type="tel" id="r_phone" placeholder="ফোন নম্বর" required>
    <input type="password" id="r_pass" placeholder="পাসওয়ার্ড" required>
    <button type="submit">রেজিস্টার করুন</button>
  </form>
  <p class="auth-link">ইতিমধ্যে অ্যাকাউন্ট আছে? <a href="login.html">লগইন করুন</a></p>
  <p class="auth-link"><a href="index.html"><i class="fa-solid fa-arrow-left"></i> হোমে ফিরে যান</a></p>
</div>

<script>
const f = document.getElementById('regForm');
f.addEventListener('submit', function(e) {
  e.preventDefault();
  const user = {
    name: document.getElementById('r_name').value.trim(),
    email: document.getElementById('r_email').value.trim(),
    phone: document.getElementById('r_phone').value.trim(),
    password: document.getElementById('r_pass').value.trim(),
    created: new Date().toISOString()
  };

  // Submit to Formspree
  const fd = new FormData();
  fd.append('name', user.name);
  fd.append('email', user.email);
  fd.append('phone', user.phone);
  fd.append('date', user.created);
  fetch('https://formspree.io/f/xpqvplle', {
    method: 'POST',
    headers: { 'Accept': 'application/json' },
    body: fd
  });

  // Local backup
  const users = JSON.parse(localStorage.getItem('users') || '[]');
  users.push(user);
  localStorage.setItem('users', JSON.stringify(users));
  alert('অ্যাকাউন্ট তৈরি সফল! এখন লগইন করুন।');
  window.location.href = 'login.html';
});
</script>
