<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Funds — সোশ্যাল বুস্ট</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@300;400;600;800;900&family=Inter:wght@300;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
body { background: #f6f8fb; color: #1a0b2e; font-family: 'Noto Sans Bengali', 'Inter', sans-serif; }
.dashboard-layout { display: grid; grid-template-columns: 1fr; gap: 1.5rem; max-width: 700px; margin: 0 auto; padding: 2rem 5%; }
.sidebar { background: #fff; border-radius: 1.25rem; padding: 1.5rem; border: 1px solid #ececf5; box-shadow: 0 6px 25px rgba(0,0,0,0.04); height: fit-content; }
.profile-card { text-align: center; padding-bottom: 1.25rem; border-bottom: 1px solid #ececf5; margin-bottom: 1rem; }
.profile-card img { width: 72px; height: 72px; border-radius: 50%; border: 3px solid #7b2cbf; object-fit: cover; margin-bottom: 0.5rem; }
.profile-card h3 { font-weight: 800; color: #1a0b2e; margin-bottom: 0.15rem; font-size: 1rem; }
.profile-card .balance { color: #777; font-weight: 700; font-size: 0.85rem; }
.profile-card .badge { display: inline-block; background: #ff2d75; color: #fff; font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 999px; font-weight: 700; margin-top: 0.25rem; }
.sidebar nav ul { list-style: none; }
.sidebar nav li { margin-bottom: 0.2rem; }
.sidebar nav a { display: flex; align-items: center; gap: 0.75rem; padding: 0.65rem 0.75rem; color: #3a3b4e; text-decoration: none; border-radius: 0.6rem; font-weight: 600; font-size: 0.9rem; transition: background 0.2s, color 0.2s; }
.sidebar nav a:hover, .sidebar nav a.active { background: #faf5ff; color: #1a0b2e; }
.sidebar nav a i { width: 20px; text-align: center; color: #7b2cbf; }

.main-area { background: #fff; border-radius: 1.25rem; padding: 2rem; border: 1px solid #ececf5; box-shadow: 0 6px 25px rgba(0,0,0,0.04); }
.main-area header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; border-bottom: 1px solid #ececf5; padding-bottom: 1rem; }
.main-area header h1 { font-size: 1.5rem; font-weight: 900; color: #1a0b2e; letter-spacing: -0.02em; }
.main-area header span { color: #777; font-size: 0.85rem; font-weight: 600; }

.pay-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; }
.pay-btn { background: #fff; border: 1.5px solid #ececf5; border-radius: 0.9rem; padding: 1.25rem; text-align: center; color: #1a0b2e; text-decoration: none; font-weight: 700; font-size: 0.95rem; transition: transform 0.15s, box-shadow 0.2s, border-color 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
.pay-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(123,44,191,0.12); border-color: #d6c6f0; }
.pay-btn i { font-size: 1.8rem; display: block; margin-bottom: 0.5rem; color: #ff2d75; }

.method-box { margin-top: 1.5rem; background: #f6f8fb; border: 1px solid #ececf5; border-radius: 0.75rem; padding: 1.25rem; }
.method-box label { color: #777; font-weight: 700; display: block; margin-bottom: 0.5rem; font-size: 0.9rem; }
.method-box select { width: 100%; padding: 0.7rem; border-radius: 0.5rem; background: #fff; border: 1px solid #ececf5; color: #1a0b2e; font-family: inherit; font-size: 0.95rem; }
.instructions { margin-top: 1rem; padding: 1rem; background: linear-gradient(90deg, #fff0f5, #f6f3ff); border: 1px solid #f0d6ff; border-radius: 0.75rem; color: #1a0b2e; font-size: 0.9rem; }
.instructions h4 { color: #7b2cbf; font-weight: 800; margin-bottom: 0.25rem; }
.bonus-box { margin-top: 1rem; padding: 1rem; background: linear-gradient(90deg, #fff8e1, #fff); border: 1px solid #ffe082; border-radius: 0.75rem; display: flex; align-items: center; justify-content: space-between; }
.bonus-box span { color: #b26a00; font-weight: 700; font-size: 0.85rem; }
.bonus-box a { color: #fff; text-decoration: none; font-weight: 700; font-size: 0.85rem; background: linear-gradient(135deg, #ff2d75, #7b2cbf); padding: 0.4rem 1rem; border-radius: 999px; }
@media (max-width: 900px) { .dashboard-layout { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="dashboard-layout">

  <!-- Sidebar -->
  <aside class="sidebar" style="padding:0;border:none;box-shadow:none;background:transparent;display:none;">
  </aside>

  <!-- Main -->
  <main class="main-area">
    <header>
                                    <h1>Add Funds</span></h1>
    </header>

    <div class="pay-grid">
      <a href="#" class="pay-btn"><i class="fa-brands fa-bitcoin" style="color:#f3ba2f;"></i> Binance</a>
      <a href="#" class="pay-btn"><i class="fa-solid fa-mobile-screen-button" style="color:#e2136e;"></i> bKash</a>
      <a href="#" class="pay-btn"><i class="fa-solid fa-money-bill-transfer" style="color:#f7941d;"></i> Nagad</a>
    </div>

    <div class="method-box">
      <label for="payMethod">Method</label>
      <select id="payMethod">
        <option>Binance Auto Payment</option>
        <option>bKash Manual</option>
        <option>Nagad Manual</option>
      </select>
    </div>

    <div class="instructions">
      <h4><i class="fa-solid fa-bolt"></i> BINANCE<br>SECURE AUTOMATIC PAYMENT</h4>
      <p><strong>$100+ DEPOSIT</strong> &nbsp; <strong>2% BONUS</strong> &nbsp; &nbsp; <strong>$1000+ DEPOSIT</strong> &nbsp; <strong>5% BONUS</strong></p>
      <p style="margin-top:0.25rem; color:#777;">TRANSACTION FEE: 0% (FREE)</p>
    </div>

    <div class="bonus-box">
      <span><i class="fa-solid fa-gift"></i> Create Binance Account — Get Bonus!</span>
      <a href="#">Sign Up</a>
    </div>
  </main>

</div>

</body>
</html>
