.btn-outline { display: block; padding: 1rem; background: #fff; color: #1a0b2e; border: 2px solid #ececf5; text-decoration: none; border-radius: 999px; font-weight: 800; font-size: 1rem; transition: border-color 0.2s, background 0.2s; }
.btn-outline:hover { border-color: #7b2cbf; background: #faf5ff; }
